[env:esp32-c3-devkitm-1]
platform = espressif32 @ 6.6.0
board = esp32-c3-devkitm-1
framework = arduino

; --- CẤU HÌNH ÉP CHO MẠCH SUPER MINI ---
board_build.flash_mode = dio     ; Chuyển sang DIO để không bị lỗi đọc NVS
board_build.f_cpu = 160000000L   ; Đảm bảo xung nhịp CPU 160MHz
board_build.f_flash = 80000000L  ; Tốc độ Flash 80MHz

monitor_speed = 115200

; Ép kiểu cấu hình cho dòng Super Mini (nếu gặp vấn đề về nạp code hoặc giao tiếp Serial)
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Ép PlatformIO quét sâu toàn bộ cây thư viện để tìm SPI.h
lib_ldf_mode = deep+

lib_deps =
    olikraus/U8g2 @ ^2.35.19            ; Thư viện đồ họa OLED tối ưu mượt mà
    adafruit/Adafruit SHT31 Library @ ^2.2.2 ; Thư viện SHT31
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library ; Thư viện MAX30102
    knolleary/PubSubClient @ ^2.8       ; Thư viện MQTT (Dùng cho giai đoạn sau)
    arduino-libraries/NTPClient @ ^3.2.1 ; Đồng bộ thời gian qua mạng